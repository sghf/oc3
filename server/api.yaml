          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/rulesets/{rset_id}:
    delete:
      description: |
        Detach a ruleset from a node
      operationId: DeleteNodeComplianceRuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathRsetId'
      responses:
        204:
          description: Ruleset successfully detached
        404:
          description: Node or ruleset not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector
    post:
      description: |
        Attach a ruleset to a node
      operationId: PostNodeComplianceRuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathRsetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: Ruleset attached
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/disks:
    get:
      operationId: GetNodeDisks
      description: List disks of a specific node
      parameters:
        - in: path
          name: node_id
          required: true
          description: Node identifier (node_id UUID or nodename)
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/{node_id}/hbas:
    get:
      operationId: GetNodeHbas
      description: List a node storage host bus adapters
      parameters:
        - in: path
          name: node_id
          required: true
          description: Node identifier (node_id UUID or nodename)
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/{node_id}/interfaces:
    get:
      operationId: GetNodeInterfaces
      description: List a node network interfaces
      parameters:
        - in: path
          name: node_id
          required: true
          description: Node identifier (node_id UUID or nodename)
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/{node_id}/tags:
    get:
      operationId: GetNodeTags
      description: List tags attached to a node
      parameters:
        - in: path
          name: node_id
          required: true
          description: Node identifier (node_id UUID or nodename)
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
