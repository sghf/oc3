openapi: 3.0.0

servers:
  - url: ./

info:
  title: opensvc collector api
  version: 1.0.3

paths:
  /apps:
    get:
      operationId: GetApps
      description: List available apps
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

    post:
      operationId: PostApps
      description: Create an application code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - app
              properties:
                app:
                  type: string
                description:
                  type: string
                app_domain:
                  type: string
                app_team_ops:
                  type: string
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        409:
          $ref: '#/components/responses/409'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /apps/{app_id}:
    post:
      operationId: PostApp
      description: Change an application code properties
      parameters:
        - in: path
          name: app_id
          required: true
          description: App record id or app code
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                app:
                  type: string
                description:
                  type: string
                app_domain:
                  type: string
                app_team_ops:
                  type: string
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
    get:
      operationId: GetApp
      description: Display app properties
      parameters:
        - in: path
          name: app_id
          required: true
          description: App record id or app code
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
    delete:
      operationId: DeleteApps
      description: Delete an application code
      parameters:
        - in: path
          name: app_id
          required: true
          description: App record id or app code
          schema:
            type: string
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        404:
          $ref: '#/components/responses/404'
        409:
          $ref: '#/components/responses/409'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /apps/{app_id}/am_i_responsible:
    get:
      operationId: GetAppAmIResponsible
      description: Return true if the requester is responsible for this application code
      parameters:
        - in: path
          name: app_id
          required: true
          description: App record id or app code
          schema:
            type: string
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /apps/{app_id}/publications:
    get:
      operationId: GetAppPublications
      description: List an application code publication groups
      parameters:
        - in: path
          name: app_id
          required: true
          description: App record id or app code
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /apps/{app_id}/responsibles:
    get:
      operationId: GetAppResponsibles
      description: List an application code responsible groups
      parameters:
        - in: path
          name: app_id
          required: true
          description: App record id or app code
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /arrays:
    get:
      operationId: GetArrays
      description: List storage arrays
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /auth/node:
    post:
      description: |
        Register a node authentication
      operationId: PostAuthNode
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - nodename
              properties:
                nodename:
                  type: string
                app:
                  type: string
      responses:
        200:
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                required:
                  - uuid
                  - info
                properties:
                  uuid:
                    type: string
                  info:
                    type: string
        403:
          $ref: '#/components/responses/403'
        409:
          $ref: '#/components/responses/409'
        500:
          $ref: '#/components/responses/500'
      security:
        - { }
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - auth

  /disks:
    get:
      operationId: GetDisks
      description: List disks
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /disks/{disk_id}:
    get:
      operationId: GetDisk
      description: List entries for a specific disk
      parameters:
        - in: path
          name: disk_id
          required: true
          description: Disk identifier
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes:
    get:
      operationId: GetNodes
      description: List nodes
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/hbas:
    get:
      operationId: GetNodesHbas
      description: List all nodes FC and iSCSI host bus adapters
      parameters:
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/{node_id}:
    get:
      operationId: GetNode
      description: List entries for a specific node
      parameters:
        - in: path
          name: node_id
          required: true
          description: Node identifier (node_id UUID or nodename)
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/{node_id}/candidate_tags:
    get:
      operationId: GetNodeCandidateTags
      description: List tags attachable to a node (not yet attached and not excluded)
      parameters:
        - in: path
          name: node_id
          required: true
          description: Node identifier (node_id UUID or nodename)
          schema:
            type: string
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      tags:
        - collector
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          $ref: '#/components/responses/404'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]

  /nodes/{node_id}/compliance/candidate_modulesets:
    get:
      description: |
        Get candidate modulesets for a node
      operationId: GetNodeComplianceCandidateModulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      responses:
        200:
          description: List of candidate modulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/candidate_rulesets:
    get:
      description: |
        Get candidate rulesets for a node
      operationId: GetNodeComplianceCandidateRulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      responses:
        200:
          description: List of candidate rulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/logs:
    get:
      description: |
        Get compliance logs for a node
      operationId: GetNodeComplianceLogs
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
      responses:
        200:
          description: Compliance logs for the node
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/modulesets:
    get:
      description: |
        Get modulesets attached to a node
      operationId: GetNodeComplianceModulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
      responses:
        200:
          description: List of attached modulesets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        404:
          description: Node not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/modulesets/{mset_id}:
    delete:
      description: |
        Detach a moduleset from a node
      operationId: DeleteNodeComplianceModuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathMsetId'
      responses:
        204:
          description: Moduleset successfully detached
        404:
          description: Node or moduleset not found
        500:
          description: Internal server error
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector
    post:
      description: |
        Attach a moduleset to a node
      operationId: PostNodeComplianceModuleset
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inPathMsetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        202:
          description: Moduleset attached
        400:
          $ref: '#/components/responses/400'
        401:
          $ref: '#/components/responses/401'
        403:
          $ref: '#/components/responses/403'
        500:
          $ref: '#/components/responses/500'
      security:
        - basicAuth: [ ]
        - bearerAuth: [ ]
      tags:
        - collector

  /nodes/{node_id}/compliance/rulesets:
    get:
      description: |
        Get rulesets attached to a node
      operationId: GetNodeComplianceRulesets
      parameters:
        - $ref: '#/components/parameters/inPathNodeId'
        - $ref: '#/components/parameters/inQueryProps'
        - $ref: '#/components/parameters/inQueryLimit'
        - $ref: '#/components/parameters/inQueryOffset'
        - $ref: '#/components/parameters/inQueryMeta'
        - $ref: '#/components/parameters/inQueryStats'
        - $ref: '#/components/parameters/inQueryOrderby'
        - $ref: '#/components/parameters/inQueryGroupby'
