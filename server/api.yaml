components:

  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '204':
      description: No Content
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '408':
      description: Request Timeout
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    '503':
      description: Service Unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    ListMeta:
      type: object
      required:
      properties:
        count:
          type: integer
        available_props:
          type: array
          items:
            type: string
        included_props:
          type: array
          items:
            type: string
        limit:
          type: integer
        offset:
          type: integer
        distinct:
          type: object
          additionalProperties:
            type: integer
        total:
          type: integer

    ListResponse:
      type: object
      required:
        - data
      properties:
        data:
          oneOf:
            - type: array
              items:
                type: object
            - type: object
              additionalProperties:
                type: object
                additionalProperties:
                  type: integer
        meta:
          $ref: '#/components/schemas/ListMeta'

    Problem:
      type: object
      properties:
        text:
          description: |
            A human-readable explanation specific to this occurrence of the
            problem.
          type: string
      required:
        - text

    version:
      type: object
      required:
        - version
      properties:
        version:
          type: string
          example: "0.0.1"

  parameters:
    ObjectPathHeader:
      name: OC3-ObjectPath
      in: header
      schema:
        type: string

    inPathMsetId:
      in: path
      name: mset_id
      required: true
      description: ID of the moduleset
      schema:
        type: string

    inPathNodeId:
      in: path
      name: node_id
      required: true
      description: ID of the node
      schema:
        type: string

    inPathRsetId:
      in: path
      name: rset_id
      required: true
      description: ID of the ruleset
      schema:
        type: string

    inQueryGroupby:
      in: query
      name: groupby
      required: false
      description: Comma-separated list of properties to group the result by (e.g. groupby=app,svcname).
      schema:
        type: string

    inQueryLimit:
      in: query
      name: limit
      required: false
      description: The maximum number of entries to return. 0 means no limit.
      schema:
        type: integer
        minimum: 0
        default: 50

    inQueryMeta:
      in: query
      name: meta
      required: false
      description: Include metadata in the response. Enabled by default. Use false or 0 to omit the meta field.
      schema:
        type: string

    inQueryOffset:
      in: query
      name: offset
      required: false
      description: Skip the first entries of the data cursor.
      schema:
        type: integer
        minimum: 0
        default: 0

    inQueryOrderby:
      in: query
      name: orderby
      required: false
      description: Comma-separated list of properties to sort by. Prefix a property with - for descending order (e.g. orderby=nodename,-app).
      schema:
        type: string

    inQueryProps:
      in: query
      name: props
      required: false
      description: A list of properties to include in each data dictionnary.
      schema:
        type: string

    inQueryStats:
      in: query
      name: stats
      required: false
      description: Controls the inclusion in the returned dictionnary of a "stats" key, containing the selected properties distinct values counts.
      schema:
        type: string

    inQuerySync:
      in: query
      name: sync
      schema:
        type: boolean

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
